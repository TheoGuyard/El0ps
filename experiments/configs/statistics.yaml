expname: statistics

dataset:
  dataset_type: hardcoded
  dataset_opts: 
    dataset_name  : riboflavin
  process_opts: 
    center        : false
    normalize     : false
  datafit_name: Leastsquares
  penalty_name: Bigm
  test_size: 0.3333

methods_name:
  - Omp
  - Lasso
  - Enet
  - L05
  - Mcp
  - Scad
  - L0[penalty_name=Bigm]
  - L0[penalty_name=BigmL2norm]

path_opts:
  lmbd_max: 1.e-0
  lmbd_min: 1.e-5
  lmbd_num: 101
  lmbd_scaled: true
  stop_if_not_optimal: true
  max_nnz: 10
  verbose: true
