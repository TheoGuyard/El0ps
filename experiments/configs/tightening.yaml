expname: tightening

dataset:
  dataset_type: synthetic
  dataset_opts: 
    matrix      : correlated(0.9)
    model       : linear
    supp_pos    : equispaced
    supp_val    : normal(0.,1.)
    k           : 5
    m           : 500
    n           : 1000
    s           : 10.0
    normalize   : true
    seed        : 1
  process_opts: 
    center        : true
    normalize     : true
  datafit_name: Leastsquares
  penalty_name: BoundsConstraint
  calibration_opts:
    factor_lmbd: 1.
    factor_penalty_params:
      x_lb: 1.
      x_ub: 1.

solvers:
  solvers_name:
    - el0ps[simpruning=False,peeling=True]
    - el0ps[simpruning=False]
  solvers_opts:
    time_limit: 600.
    rel_tol   : 1.e-4
    int_tol   : 1.e-8 
    verbose   : false
    trace     : true
