expname: simpruning

dataset:
  dataset_type: synthetic
  dataset_opts: 
    matrix      : correlated(0.9)
    model       : linear
    supp_pos    : equispaced
    supp_val    : normal(0.,0.)
    k           : 5
    m           : 500
    n           : 1000
    s           : 10.0
    normalize   : true
  process_opts: 
    center        : true
    normalize     : true
  datafit_name: Leastsquares
  penalty_name: Bigm
  calibration_opts:
    factor_lmbd: 1.0
    factor_penalty_params:
      M: 1.0

solvers:
  solvers_name:
    - el0ps
    - el0ps[simpruning=False]
  solvers_opts:
    time_limit: 600.
    rel_tol   : 1.e-4
    int_tol   : 1.e-8 
    verbose   : false
    trace     : true
